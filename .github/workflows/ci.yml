name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A3A79F: ${{ secrets.A3A79F }}
          B9C8CC: ${{ secrets.B9C8CC }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A3A79F', ''), os.environ.get('B9C8CC', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- ccec87504d3b033cd72a974f5fb62a7b27ab8f74ae -->', a)
          if b:
              patched = patched.replace('<!-- e9fb91db7553611fd85f72219ca759072f27351de5 -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
